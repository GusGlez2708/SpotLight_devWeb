name: Keep Render Alive

on:
  schedule:
    # Se ejecuta cada 10 minutos
    - cron: '*/10 * * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub si es necesario

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: curl -s https://spotlight-api-m2kt.onrender.com/ > /dev/null
      
      # Si también tienes un front en Render, puedes descomentar la siguiente línea y poner su URL
      # - name: Ping Web
      #   run: curl -s https://tu-sitio-web.onrender.com/ > /dev/null
