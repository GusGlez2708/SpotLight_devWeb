<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotLight — Admin Panel</title>
    <meta name="description"
        content="Panel de administración de proyectos SpotLight. Gestiona, evalúa y controla tus proyectos.">
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="styles.css?v=1.3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <nav class="navbar">
        <div class="navbar-inner">
            <a href="#" class="navbar-brand">
                <img src="logo.png" alt="SpotLight Logo" class="navbar-logo">
                <div>
                    <div class="navbar-title"><span>Spot</span>Light</div>
                    <div class="navbar-subtitle">Admin Panel</div>
                </div>
            </a>
            <div class="api-badge" id="apiBadge">API Conectada</div>
        </div>
    </nav>

    <div class="main-container">

        <aside class="form-panel">
            <div class="panel-header">
                <i class="fa-solid fa-rocket"></i>
                <h2 class="panel-title">Nuevo Proyecto</h2>
            </div>
            <form id="projectForm" onsubmit="crearProyecto(event)" novalidate>
                <div class="form-group">
                    <label class="form-label" for="title">Nombre del Proyecto</label>
                    <input type="text" id="title" class="form-input" placeholder="Ej: Eco-Dron Smart" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="category">Categoría</label>
                    <select id="category" class="form-select">
                        <option>Sustentabilidad</option>
                        <option>Tecnología</option>
                        <option>Salud</option>
                        <option>Arte</option>
                        <option>Juegos</option>
                        <option>Proyectos</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="platform">Tipo de Proyecto</label>
                    <select id="platform" class="form-select">
                        <option value="Web">Web</option>
                        <option value="Móvil">Móvil</option>
                        <option value="Web y Móvil">Web y Móvil</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="desc">Descripción</label>
                    <textarea id="desc" class="form-textarea" rows="2" placeholder="Breve descripción del proyecto..."
                        required></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label" for="videoUrl">URL del Video (Demo)</label>
                    <input type="url" id="videoUrl" class="form-input" placeholder="https://..." required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="previewVideoUrl">URL del Video Corto (Preview)</label>
                    <input type="url" id="previewVideoUrl" class="form-input" placeholder="https://..." required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="imageUrl">URL de la Imagen (App Móvil)</label>
                    <input type="url" id="imageUrl" class="form-input" placeholder="https://..." required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="teamNo">Número de Equipo</label>
                    <input type="number" id="teamNo" class="form-input" value="1" min="1">
                </div>

                <div class="form-group">
                    <label class="form-label">Integrantes (Máx. 6)</label>
                    <div id="membersList" class="dynamic-list-container"></div>
                    <button type="button" class="btn-add-dashed" onclick="addMemberInput('membersList')">
                        <i class="fa-solid fa-plus"></i> Añadir Integrante
                    </button>
                </div>

                <div class="form-group">
                    <label class="form-label">Tecnologías</label>
                    <div class="tech-input-wrapper">
                        <input type="text" id="techInput" class="form-input" list="techOptions"
                            placeholder="Ej: React, .NET...">
                        <datalist id="techOptions"></datalist>
                        <button type="button" class="btn-add-tech"
                            onclick="addTechTag('techInput', 'techTagsContainer')">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                    <div id="techTagsContainer" class="tech-tags-list"></div>
                </div>
                <button type="submit" class="btn-submit">
                    <i class="fa-solid fa-paper-plane"></i> Publicar Proyecto
                </button>
            </form>
        </aside>

        <section class="projects-section">
            <div class="section-header">
                <h2 class="section-title">
                    <i class="fa-solid fa-layer-group"></i> Proyectos
                </h2>
                <div class="header-actions">
                    <button onclick="recalcularEstadisticas()" class="btn-refresh"
                        title="Recalcular estadísticas de IA">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> Sincronizar Datos
                    </button>
                    <button onclick="cargarProyectos()" class="btn-refresh">
                        <i class="fa-solid fa-arrows-rotate"></i> Refrescar
                    </button>
                </div>
            </div>
            <div id="projectsList" class="projects-grid">
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <p>Conectando con el servidor...</p>
                </div>
            </div>
        </section>
    </div>

    <div id="deleteModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header danger">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <h3 class="modal-title">Eliminar Proyecto</h3>
            </div>
            <div class="modal-body">
                <p>¿Estás seguro de que deseas eliminar <span id="deleteProjectName"
                        class="project-name-highlight"></span>? Esta acción es <strong>permanente</strong> e
                    irreversible.</p>
            </div>
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" onclick="cerrarModal('deleteModal')">Cancelar</button>
                <button class="btn-modal btn-danger" id="btnConfirmDelete">
                    <i class="fa-solid fa-trash"></i> Eliminar
                </button>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header edit">
                <i class="fa-solid fa-pen-to-square"></i>
                <h3 class="modal-title">Editar Proyecto</h3>
            </div>
            <div class="modal-body">
                <form id="editForm" novalidate>
                    <div class="form-group">
                        <label class="form-label">Nombre</label>
                        <input type="text" id="editTitle" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Categoría</label>
                        <select id="editCategory" class="form-select">
                            <option>Sustentabilidad</option>
                            <option>Tecnología</option>
                            <option>Salud</option>
                            <option>Arte</option>
                            <option>Juegos</option>
                            <option>Proyectos</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tipo de Proyecto</label>
                        <select id="editPlatform" class="form-select">
                            <option value="Web">Web</option>
                            <option value="Móvil">Móvil</option>
                            <option value="Web y Móvil">Web y Móvil</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Descripción</label>
                        <textarea id="editDesc" class="form-textarea" rows="2" required></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">URL del Video</label>
                        <input type="url" id="editVideoUrl" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">URL del Video Corto (Preview)</label>
                        <input type="url" id="editPreviewVideoUrl" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">URL de la Imagen (App Móvil)</label>
                        <input type="url" id="editImageUrl" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Número de Equipo</label>
                        <input type="number" id="editTeamNo" class="form-input" min="1">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Integrantes (Máx. 6)</label>
                        <div id="editMembersList" class="dynamic-list-container"></div>
                        <button type="button" class="btn-add-dashed" onclick="addMemberInput('editMembersList')">
                            <i class="fa-solid fa-plus"></i> Añadir Integrante
                        </button>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Tecnologías</label>
                        <div class="tech-input-wrapper">
                            <input type="text" id="editTechInput" class="form-input" list="editTechOptions"
                                placeholder="Ej: React, .NET...">
                            <datalist id="editTechOptions"></datalist>
                            <button type="button" class="btn-add-tech"
                                onclick="addTechTag('editTechInput', 'editTechTagsContainer')">
                                <i class="fa-solid fa-plus"></i>
                            </button>
                        </div>
                        <div id="editTechTagsContainer" class="tech-tags-list"></div>
                    </div>
                </form>
            </div>
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" onclick="cerrarModal('editModal')">Cancelar</button>
                <button class="btn-modal btn-primary" id="btnConfirmEdit">
                    <i class="fa-solid fa-save"></i> Guardar Cambios
                </button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="app.js?v=1.3"></script>
</body>

</html>
